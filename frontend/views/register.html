<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Sanctuary AI</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card slide-up" style="max-width:520px">
      <div class="auth-logo">
        <div class="logo-icon">S</div>
        <span style="font-weight:800;font-size:1.1rem">Sanctuary AI</span>
      </div>

      <h1 class="auth-title">Únete al Santuario</h1>
      <p class="auth-sub">Comienza tu viaje hacia una gestión financiera inteligente y segura.</p>

      <div id="reg-alert" class="alert hidden"></div>

      <form id="register-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" id="reg-firstName" class="form-input" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido</label>
            <input type="text" id="reg-lastName" class="form-input" placeholder="Tu apellido" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-input" placeholder="correo@ejemplo.com" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div style="position:relative">
              <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres" required style="padding-right:48px">
              <button type="button" onclick="togglePassword('reg-password',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Contraseña</label>
            <div style="position:relative">
              <input type="password" id="reg-confirm" class="form-input" placeholder="Repetir contraseña" required style="padding-right:48px">
              <button type="button" onclick="togglePassword('reg-confirm',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <div style="display:flex;align-items:start;gap:10px;margin-bottom:20px">
          <input type="checkbox" id="reg-terms" style="margin-top:4px;width:16px;height:16px" required>
          <label for="reg-terms" style="font-size:0.75rem;color:var(--text-muted);line-height:1.5">
            Acepto los <a href="#" style="color:var(--accent);font-weight:600">Términos de Servicio</a> y la <a href="#" style="color:var(--accent);font-weight:600">Política de Privacidad</a> de Sanctuary AI.
          </label>
        </div>

        <button type="submit" id="reg-btn" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Crear Cuenta
        </button>
      </form>

      <div class="divider">O continúa con</div>
      <div id="google-btn-container" style="margin-top: 16px; display: flex; justify-content: center; width: 100%;"></div>
      <div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">Si no se abre, desactiva el bloqueador de pop-ups de tu navegador 🛡️</div>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a>
      </div>
    </div>
  </div>

  <script src="../js/modules/config.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/navbar.js"></script>
  <script src="../js/modules/notifications.js"></script>
  <script>
    if (auth.isLoggedIn()) window.location.href = 'dashboard.html';

    // Inicializar Google Sign-In oficial
    function initGoogleSignIn() {
      if (typeof google === 'undefined') {
        setTimeout(initGoogleSignIn, 100);
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleLogin,
        itp_support: true
      });
      google.accounts.id.renderButton(
        document.getElementById("google-btn-container"),
        { theme: "filled_blue", size: "large", width: 440, shape: "rectangular" }
      );
    }

    async function handleGoogleLogin(response) {
      try {
        const data = await auth.loginWithGoogleToken(response.credential);
        if (data.user) {
          window.location.href = 'dashboard.html';
        } else {
          showAlert('#reg-alert', data.error || 'Error al iniciar sesión con Google');
        }
      } catch (err) {
        console.error(err);
        showAlert('#reg-alert', 'Error al conectar con el servidor de Google');
      }
    }

    // Ejecutar al cargar la página
    if (document.readyState === 'complete') {
      initGoogleSignIn();
    } else {
      window.addEventListener('load', initGoogleSignIn);
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('reg-firstName').value.trim();
      const lastName = document.getElementById('reg-lastName').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const terms = document.getElementById('reg-terms').checked;
      const btn = document.getElementById('reg-btn');

      hideAlert('#reg-alert');

      if (!firstName || !lastName) { showAlert('#reg-alert', 'Completá tu nombre y apellido'); return; }
      if (!email || !email.includes('@')) { showAlert('#reg-alert', 'Ingresá un email válido'); return; }
      if (password.length < 6) { showAlert('#reg-alert', 'La contraseña debe tener al menos 6 caracteres'); return; }
      if (password !== confirm) { showAlert('#reg-alert', 'Las contraseñas no coinciden'); return; }
      if (!terms) { showAlert('#reg-alert', 'Debés aceptar los Términos de Servicio'); return; }

      setLoading(btn, true);
      try {
        await auth.register(firstName, lastName, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('#reg-alert', err.message || 'Error al crear la cuenta');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
