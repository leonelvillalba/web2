<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Sanctuary AI</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card slide-up">
      <div class="auth-logo">
        <div class="logo-icon">S</div>
        <span style="font-weight:800;font-size:1.1rem">Sanctuary AI</span>
      </div>

      <h1 class="auth-title">Accede a tu cuenta</h1>
      <p class="auth-sub">Continúa tu viaje hacia la libertad financiera.</p>

      <div id="login-alert" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-input" placeholder="nombre@ejemplo.com" required>
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label class="form-label" style="margin-bottom:0">Contraseña</label>
            <span style="font-size:0.72rem;color:var(--accent);font-weight:600;cursor:pointer">¿Olvidaste tu contraseña?</span>
          </div>
          <div style="position:relative">
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required style="padding-right:48px">
            <button type="button" id="toggle-pw" onclick="togglePassword('login-password','toggle-pw')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px" title="Mostrar/ocultar contraseña">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary w-full btn-lg" style="justify-content:center;margin-top:8px">
          Entrar al Santuario
        </button>
      </form>

      <div class="divider">O continúa con</div>
      <div id="google-btn-container" style="margin-top: 16px; display: flex; justify-content: center; width: 100%;"></div>
      <div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">Si no se abre, desactiva el bloqueador de pop-ups de tu navegador 🛡️</div>

      <div class="auth-footer">
        ¿No tienes una cuenta? <a href="register.html">Regístrate</a>
      </div>

      <!-- Demo accounts -->
      <div class="demo-box">
        <div class="demo-label">Acceso rápido (Demo)</div>
        <div class="demo-accounts">
          <button class="demo-account-btn" onclick="quickLogin('leonel@sanctuary.ai')">
            <span>👑 Leonel — <strong style="color:var(--accent)">Premium</strong></span>
            <span class="demo-email">leonel@sanctuary.ai</span>
          </button>
          <button class="demo-account-btn" onclick="quickLogin('maria@sanctuary.ai')">
            <span>👤 María — <strong>Básico</strong></span>
            <span class="demo-email">maria@sanctuary.ai</span>
          </button>
          <button class="demo-account-btn" onclick="quickLogin('asesor@sanctuary.ai')">
            <span>📊 Alex — <strong style="color:var(--secondary)">Asesor</strong></span>
            <span class="demo-email">asesor@sanctuary.ai</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/modules/config.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/navbar.js"></script>
  <script src="../js/modules/notifications.js"></script>
  <script>
    if (auth.isLoggedIn()) window.location.href = 'dashboard.html';

    // Inicializar Google Sign-In oficial
    function initGoogleSignIn() {
      if (typeof google === 'undefined') {
        setTimeout(initGoogleSignIn, 100);
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleLogin,
        itp_support: true
      });
      google.accounts.id.renderButton(
        document.getElementById("google-btn-container"),
        { theme: "filled_blue", size: "large", width: 376, shape: "rectangular" }
      );
    }

    async function handleGoogleLogin(response) {
      try {
        const data = await auth.loginWithGoogleToken(response.credential);
        if (data.user) {
          window.location.href = 'dashboard.html';
        } else {
          showAlert('#login-alert', data.error || 'Error al iniciar sesión con Google');
        }
      } catch (err) {
        console.error(err);
        showAlert('#login-alert', 'Error al conectar con el servidor de Google');
      }
    }

    // Ejecutar al cargar la página
    if (document.readyState === 'complete') {
      initGoogleSignIn();
    } else {
      window.addEventListener('load', initGoogleSignIn);
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pw = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      
      hideAlert('#login-alert');
      if (!email) { showAlert('#login-alert', 'Ingresá tu correo electrónico'); return; }
      if (!pw) { showAlert('#login-alert', 'Ingresá tu contraseña'); return; }
      if (!email.includes('@')) { showAlert('#login-alert', 'El formato del email no es válido'); return; }

      setLoading(btn, true);
      try {
        await auth.login(email, pw);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('#login-alert', err.message || 'Email o contraseña incorrectos');
      } finally {
        setLoading(btn, false);
      }
    });

    async function quickLogin(email) {
      try {
        await auth.login(email, '123456');
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('#login-alert', err.message || 'Error al iniciar sesión');
      }
    }
  </script>
</body>
</html>
