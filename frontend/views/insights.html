<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspectivas IA — Sanctuary AI</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar"></div>
<div class="main-content">
      <header class="navbar">
        <div class="navbar-left"><h2 style="font-weight:700;font-size:1rem">🧠 Perspectivas IA</h2></div>
        <div class="navbar-right">
          <div class="flex items-center gap-2">
            <div class="navbar-avatar" id="navbar-avatar">XX</div>
            <div class="navbar-user-info"><div class="name" id="navbar-name">—</div><div class="plan" id="navbar-plan">—</div></div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1 class="page-title">Perspectivas de IA</h1>
          <p class="page-subtitle">Recomendaciones y análisis inteligente basados en tus patrones financieros.</p>
        </div>

        <!-- AI Score -->
        <div class="insight-card mb-6" style="display:flex;align-items:center;gap:24px">
          <div style="width:80px;height:80px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:1.8rem;font-weight:900" id="score">—</span>
          </div>
          <div>
            <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:4px">Índice de Salud Financiera</h3>
            <p style="color:rgba(255,255,255,0.7);font-size:0.875rem" id="score-desc">Analizando tus datos...</p>
          </div>
        </div>

        <div class="grid-2">
          <!-- Recommendations -->
          <div class="card">
            <h3 style="font-weight:700;margin-bottom:20px">🎯 Recomendaciones Personalizadas</h3>
            <div id="recommendations" style="display:flex;flex-direction:column;gap:12px">
              <div style="padding:20px;text-align:center;color:var(--text-muted)"><span class="spinner spinner-dark"></span></div>
            </div>
          </div>

          <!-- Spending Patterns -->
          <div class="card">
            <h3 style="font-weight:700;margin-bottom:20px">📊 Análisis de Patrones</h3>
            <div id="patterns" style="display:flex;flex-direction:column;gap:12px">
              <div style="padding:20px;text-align:center;color:var(--text-muted)"><span class="spinner spinner-dark"></span></div>
            </div>
          </div>
        </div>

        <!-- Monthly trend -->
        <div class="card mt-6">
          <h3 style="font-weight:700;margin-bottom:16px">📈 Resumen del Mes</h3>
          <div id="monthly-summary">
            <div style="padding:20px;text-align:center;color:var(--text-muted)"><span class="spinner spinner-dark"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/components/sidebar.js"></script>
  <script src="../js/modules/config.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/navbar.js"></script>
  <script src="../js/modules/notifications.js"></script>
  <script>
    if (!auth.requireAuth()) throw 'No auth';
    renderSidebar('insights');
    renderNavbarUser();
    applyRoleUI();
    const user = auth.getUser();
    loadInsights();

    async function loadInsights() {
      try {
        const [insights, expenses] = await Promise.all([
          api.get(`/insights`),
          api.get(`/expenses`),
        ]);

        // Score
        const totalExp = expenses.filter(e => e.type === 'expense').reduce((s, e) => s + Number(e.amount), 0);
        const totalInc = expenses.filter(e => e.type === 'income').reduce((s, e) => s + Number(e.amount), 0);
        const score = totalInc > 0 ? Math.min(99, Math.round((1 - totalExp/totalInc) * 100 + 50)) : 72;
        setText('#score', score);
        if (insights && insights.aiMessage) {
          setText('#score-desc', insights.aiMessage);
        } else {
          setText('#score-desc', score >= 70 ? '¡Tu salud financiera es buena! Seguí optimizando.' : 'Podés mejorar. Mirá las recomendaciones.');
        }

        // Categories breakdown
        const cats = {};
        expenses.filter(e => e.type === 'expense').forEach(e => { cats[e.category] = (cats[e.category]||0) + Number(e.amount); });
        const sortedCats = Object.entries(cats).sort(([,a],[,b]) => b - a);
        const topCat = sortedCats[0] || ['Ninguno', 0];

        // Recommendations
        let recs = [];
        if (insights && insights.aiRecommendations && insights.aiRecommendations.length > 0) {
          recs = insights.aiRecommendations.map((rec, i) => {
            const icons = ['💡', '🎯', '💰', '📊', '⚡'];
            const priorities = ['info', 'warning', 'success', 'primary', 'secondary'];
            
            // Compatibilidad por si rec es un string (código viejo) o un objeto {title, text}
            const isObject = typeof rec === 'object' && rec !== null;
            const title = isObject ? (rec.title || 'Consejo IA') : 'Consejo IA';
            const text = isObject ? (rec.text || '') : rec;
            
            return {
              icon: icons[i % icons.length],
              title: title,
              text: text,
              priority: priorities[i % priorities.length]
            };
          });
        } else {
          // Fallback en caso de que falle la API de Gemini
          recs = [
            { icon: '💡', title: 'Optimizar Suscripciones', text: `Revisá tus suscripciones mensuales. Podés ahorrar cancelando las que no usás.`, priority: 'warning' },
            { icon: '🛒', title: `${topCat[0]} es tu mayor gasto`, text: `Gastaste ${formatMoney(topCat[1])} en ${topCat[0]}. Considerá buscar alternativas más económicas.`, priority: 'error' },
            { icon: '💰', title: 'Fondo de Emergencia', text: 'Intentá ahorrar el equivalente a 3-6 meses de gastos para imprevistos.', priority: 'info' },
            { icon: '📊', title: 'Registrá todos los gastos', text: 'Cuantos más gastos registres, mejores serán las recomendaciones de la IA.', priority: 'success' },
          ];
        }
        
        setHTML('#recommendations', recs.map(r => `
          <div style="display:flex;gap:14px;padding:14px;background:var(--bg);border-radius:var(--radius);border-left:3px solid var(--${r.priority})">
            <span style="font-size:1.4rem;flex-shrink:0">${r.icon}</span>
            <div>
              <div style="font-weight:700;font-size:0.875rem;margin-bottom:3px">${r.title}</div>
              <p class="text-sm text-muted">${r.text}</p>
            </div>
          </div>
        `).join(''));

        // Patterns
        if (sortedCats.length === 0) {
          setHTML('#patterns', '<div class="empty-state"><p class="empty-state-title">Sin datos suficientes</p><p class="empty-state-desc">Agregá al menos 3 gastos para ver patrones.</p></div>');
        } else {
          setHTML('#patterns', sortedCats.map(([cat, amt]) => {
            const pct = totalExp > 0 ? Math.round((amt / totalExp) * 100) : 0;
            return `
              <div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)">
                <span style="font-size:1.4rem">${categoryIcons[cat]||'📦'}</span>
                <div style="flex:1">
                  <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                    <span style="font-weight:600;font-size:0.85rem">${cat}</span>
                    <span style="font-weight:700;font-size:0.85rem">${formatMoney(amt)}</span>
                  </div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>
                <span class="badge badge-info">${pct}%</span>
              </div>
            `;
          }).join(''));
        }

        // Monthly summary
        const thisMonth = expenses.filter(e => {
          const d = new Date(e.date);
          const now = new Date();
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
        const mExp = thisMonth.filter(e => e.type === 'expense').reduce((s,e) => s + Number(e.amount), 0);
        const mInc = thisMonth.filter(e => e.type === 'income').reduce((s,e) => s + Number(e.amount), 0);
        setHTML('#monthly-summary', `
          <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
            <div class="stat-card"><div class="stat-label">Gastos del mes</div><div class="stat-value" style="font-size:1.4rem;color:var(--error)">${formatMoney(mExp)}</div></div>
            <div class="stat-card"><div class="stat-label">Ingresos del mes</div><div class="stat-value" style="font-size:1.4rem;color:var(--success)">${formatMoney(mInc)}</div></div>
            <div class="stat-card"><div class="stat-label">Transacciones</div><div class="stat-value" style="font-size:1.4rem">${thisMonth.length}</div></div>
            <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value" style="font-size:1.4rem;color:${mInc-mExp>=0?'var(--success)':'var(--error)'}">${formatMoney(mInc-mExp)}</div></div>
          </div>
        `);

      } catch (err) {
        console.error(err);
        if (err.message && err.message.includes('requieren plan Plus')) {
          document.querySelector('.page-content').innerHTML = `
            <div class="card" style="text-align:center;padding:60px 20px">
              <div style="font-size:4rem;margin-bottom:16px">🔒</div>
              <h2>Contenido Exclusivo Plus</h2>
              <p class="text-muted" style="max-width:400px;margin:10px auto">Las perspectivas IA avanzadas y el análisis de patrones están disponibles solo en el plan Plus.</p>
              <button class="btn btn-accent mt-4" onclick="plans.showUpgradePrompt('stats')">Mejorar a Plus</button>
            </div>
          `;
          plans.showUpgradePrompt('stats');
        } else {
          toast('Error al cargar perspectivas', 'error');
        }
      }
    }
  </script>
</body>
</html>
