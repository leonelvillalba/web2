<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Sanctuary AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card slide-up" style="max-width:520px">
      <div class="auth-logo">
        <div class="logo-icon">S</div>
        <span style="font-weight:800;font-size:1.1rem">Sanctuary AI</span>
      </div>

      <h1 class="auth-title">Únete al Santuario</h1>
      <p class="auth-sub">Comienza tu viaje hacia una gestión financiera inteligente y segura.</p>

      <div id="reg-alert" class="alert hidden"></div>

      <form id="register-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" id="reg-firstName" class="form-input" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido</label>
            <input type="text" id="reg-lastName" class="form-input" placeholder="Tu apellido" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-input" placeholder="correo@ejemplo.com" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Contraseña</label>
            <input type="password" id="reg-confirm" class="form-input" placeholder="Repetir contraseña" required>
          </div>
        </div>

        <div style="display:flex;align-items:start;gap:10px;margin-bottom:20px">
          <input type="checkbox" id="reg-terms" style="margin-top:4px;width:16px;height:16px" required>
          <label for="reg-terms" style="font-size:0.75rem;color:var(--text-muted);line-height:1.5">
            Acepto los <a href="#" style="color:var(--accent);font-weight:600">Términos de Servicio</a> y la <a href="#" style="color:var(--accent);font-weight:600">Política de Privacidad</a> de Sanctuary AI.
          </label>
        </div>

        <button type="submit" id="reg-btn" class="btn btn-primary w-full btn-lg" style="justify-content:center">
          Crear Cuenta
        </button>
      </form>

      <div class="divider">O continúa con</div>
      <div class="social-btns">
        <button class="social-btn" onclick="toast('Google OAuth próximamente','info')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="toast('Apple ID próximamente','info')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (auth.isLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('reg-firstName').value.trim();
      const lastName = document.getElementById('reg-lastName').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const terms = document.getElementById('reg-terms').checked;
      const btn = document.getElementById('reg-btn');

      hideAlert('#reg-alert');

      if (!firstName || !lastName) { showAlert('#reg-alert', 'Completá tu nombre y apellido'); return; }
      if (!email || !email.includes('@')) { showAlert('#reg-alert', 'Ingresá un email válido'); return; }
      if (password.length < 6) { showAlert('#reg-alert', 'La contraseña debe tener al menos 6 caracteres'); return; }
      if (password !== confirm) { showAlert('#reg-alert', 'Las contraseñas no coinciden'); return; }
      if (!terms) { showAlert('#reg-alert', 'Debés aceptar los Términos de Servicio'); return; }

      setLoading(btn, true);
      try {
        await auth.register(firstName, lastName, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('#reg-alert', err.message || 'Error al crear la cuenta');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
